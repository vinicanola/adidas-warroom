name: CI Collector — Adidas War Room

# Roda a cada hora + sob demanda + a cada push (para teste)
on:
  schedule:
    - cron: "5 * * * *"   # minuto 5 de cada hora UTC
  workflow_dispatch:        # permite rodar manualmente pelo GitHub UI
  push:
    branches: [main]
    paths: [collector.py]

# Necessário para que o job possa fazer commit dos resultados
permissions:
  contents: write

concurrency:
  group: ci-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 pytrends pandas lxml

      - name: Run collector
        run: python collector.py
        env:
          META_AD_LIBRARY_TOKEN: ${{ secrets.META_AD_LIBRARY_TOKEN }}
          PYTHONUNBUFFERED: "1"

      - name: Verify output
        run: |
          test -f data/latest.json || (echo "ERRO: data/latest.json não foi gerado" && exit 1)
          python -c "import json; d=json.load(open('data/latest.json')); print('OK:', len(d.get('signals',[])), 'sinais,', len(d.get('latas',[])), 'latas')"

      - name: Commit & push
        run: |
          # Email do bot oficial reconhecido pela Vercel
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --staged --quiet; then
            echo "Sem mudanças no data/latest.json — pulando commit."
          else
            git commit -m "chore(data): auto-update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Deploy to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_zelDzRiWO9olGyym691h9iPk
          VERCEL_PROJECT_ID: prj_yWj1LLKbWzHvo1UQWRkTosMtaYva
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN nao configurado em Secrets. Pulando deploy."
            echo "Para ativar: gere token em https://vercel.com/account/tokens"
            echo "  e adicione em https://github.com/vinicanola/adidas-warroom/settings/secrets/actions"
            exit 0
          fi
          npm install -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
